name: impactofit
description: "Aplicación móvil de fitness y entrenamiento personalizado."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Estado (Provider) ──────────────────────────────────────────────────────
  provider: ^6.0.0

  # ── HTTP & Networking ──────────────────────────────────────────────────────
  http: ^1.1.0

  # ── Almacenamiento Seguro (Tokens JWT) ─────────────────────────────────────
  flutter_secure_storage: ^10.0.0

  # ── Validación de Email ────────────────────────────────────────────────────
  email_validator: ^3.0.0

  # ── Logging & Debugging ────────────────────────────────────────────────────
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Análisis estático ──────────────────────────────────────────────────────
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ── Assets ─────────────────────────────────────────────────────────────────
  assets:
    - assets/images/
